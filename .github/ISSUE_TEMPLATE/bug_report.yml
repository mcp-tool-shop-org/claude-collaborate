name: Bug Report
description: Report a bug in Claude Collaborate
labels: ["bug"]
body:
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which environment does this affect?
      options:
        - Whiteboard
        - Code Workshop
        - Chess Workshop
        - Capture Viewer
        - GitHub Toolkit
        - Creative Lab
        - WebSocket Bridge
        - Server / API
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Start the server with `python server.py`
        2. Open the Whiteboard
        3. ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Chrome 124 on Windows 11"
    validations:
      required: false
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: false
