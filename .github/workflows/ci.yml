name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "*.py"
      - "tests/**"
      - "requirements*.txt"
      - "ruff.toml"
      - "pytest.ini"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "*.py"
      - "tests/**"
      - "requirements*.txt"
      - "ruff.toml"
      - "pytest.ini"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check server.py ws_bridge.py tests/

      - name: Mypy type check
        run: mypy server.py ws_bridge.py --ignore-missing-imports

      - name: Tests
        run: pytest tests/ -v
